[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["adaptive_learning", "ai", "backend", "graph_engine", "knowledge_engine", "retrieval", "tests", "workspace_engine"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["UP046"]

[tool.mypy]
python_version = "3.12"
plugins = []
strict = false
warn_unused_configs = true
ignore_missing_imports = true
packages = ["adaptive_learning", "backend", "graph_engine", "retrieval", "workspace_engine"]
