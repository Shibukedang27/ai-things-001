name: researchforge-os

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: researchforge-api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://researchforge:researchforge_dev_password@postgres:5432/researchforge
      ENVIRONMENT: local
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: researchforge-postgres
    environment:
      POSTGRES_DB: researchforge
      POSTGRES_USER: researchforge
      POSTGRES_PASSWORD: researchforge_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchforge -d researchforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: researchforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: researchforge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: researchforge-neo4j
    environment:
      NEO4J_AUTH: neo4j/researchforge_dev_password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  minio:
    image: minio/minio:latest
    container_name: researchforge-minio
    environment:
      MINIO_ROOT_USER: researchforge
      MINIO_ROOT_PASSWORD: researchforge_dev_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
