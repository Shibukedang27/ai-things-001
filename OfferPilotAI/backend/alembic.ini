[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 60
revision_environment = false
sourceless = false
version_locations = %(here)s/migrations/versions
path_separator = os
sqlalchemy.url = postgresql+asyncpg://offerpilotai:offerpilotai_change_me@localhost:5432/offerpilotai

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
