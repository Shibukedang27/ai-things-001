services:
  api:
    build:
      target: production
    image: ${OFFERPILOT_AI_API_IMAGE:-offerpilot-ai-api}:${OFFERPILOT_AI_IMAGE_TAG:-production}
    environment:
      OFFERPILOT_AI_ENVIRONMENT: production
      OFFERPILOT_AI_DEBUG: "false"
      OFFERPILOT_AI_DOCS_ENABLED: "false"
      OFFERPILOT_AI_RUN_SEED: "false"
      OFFERPILOT_AI_WAIT_FOR_DATABASE: "true"
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - ${API_WORKERS:-2}

  frontend:
    build:
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: ${OFFERPILOT_AI_FRONTEND_IMAGE:-offerpilot-ai-frontend}:${OFFERPILOT_AI_IMAGE_TAG:-production}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
