services:
  api:
    build:
      target: development
    image: offerpilot-ai-api:development
    environment:
      OFFERPILOT_AI_ENVIRONMENT: local
      OFFERPILOT_AI_DEBUG: "true"
      OFFERPILOT_AI_DOCS_ENABLED: "true"
      OFFERPILOT_AI_RUN_MIGRATIONS: "true"
      OFFERPILOT_AI_RUN_SEED: "true"
      OFFERPILOT_AI_WAIT_FOR_DATABASE: "true"
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      target: development
    image: offerpilot-ai-frontend:development
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_API_PROXY_TARGET: http://api:8000
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 8080"]
    volumes:
      - ./frontend:/app
      - offerpilotai_frontend_node_modules:/app/node_modules
